# docker-compose.yml
# ===================
# Orchestrates a simulated IoT network with four containers:
#   - camera      (172.20.0.10) — normal RTSP-like UDP stream
#   - thermostat  (172.20.0.11) — normal MQTT-like temperature reports
#   - bulb        (172.20.0.12) — normal HTTP-like status pings
#   - rogue       (172.20.0.99) — malicious port-scanning / UDP-flood device
#
# All containers share a custom Docker bridge network (iot_network) so the
# edge-layer packet capture agent can observe every frame on the subnet.

version: "3.9"

networks:
  iot_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  # ---------------------------------------------------------------
  # Normal IoT device: IP camera streaming RTSP-like UDP traffic
  # ---------------------------------------------------------------
  camera:
    build:
      context: ./camera
      dockerfile: Dockerfile
    container_name: iot_camera
    networks:
      iot_network:
        ipv4_address: 172.20.0.10
    restart: unless-stopped

  # ---------------------------------------------------------------
  # Normal IoT device: thermostat sending MQTT-like temperature data
  # ---------------------------------------------------------------
  thermostat:
    build:
      context: ./thermostat
      dockerfile: Dockerfile
    container_name: iot_thermostat
    networks:
      iot_network:
        ipv4_address: 172.20.0.11
    restart: unless-stopped

  # ---------------------------------------------------------------
  # Normal IoT device: smart bulb issuing periodic HTTP-like pings
  # ---------------------------------------------------------------
  bulb:
    build:
      context: ./bulb
      dockerfile: Dockerfile
    container_name: iot_bulb
    networks:
      iot_network:
        ipv4_address: 172.20.0.12
    restart: unless-stopped

  # ---------------------------------------------------------------
  # Rogue device: port scanner + UDP flood attacker
  # Requires NET_ADMIN to craft raw packets with scapy.
  # ---------------------------------------------------------------
  rogue:
    build:
      context: ./rogue
      dockerfile: Dockerfile
    container_name: iot_rogue
    cap_add:
      - NET_ADMIN
    networks:
      iot_network:
        ipv4_address: 172.20.0.99
    restart: unless-stopped

  # ---------------------------------------------------------------
  # Capture agent: sniffs packets on the network bridge
  # ---------------------------------------------------------------
  capture:
    build:
      context: ../
      dockerfile: docker/capture/Dockerfile
    container_name: iot_capture
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ../:/app
    restart: unless-stopped
